server {
    listen 8080;
    server_name localhost;
    client_max_body_size 10000000000000;

    location / {
        root www/html;
        index index.html;
        autoindex on;
        allow_methods GET;
    }

    location /upload {
        root www/html;
        upload_dir www/html/uploads;
        allow_methods GET POST DELETE;
    }

    location /cgi-bin {
        root www/cgi-bin;
        cgi_pass .php /usr/bin/php-cgi;
        allow_methods GET POST;
    }

    location /old-page {
        return 301 /new-page;
    }
}